schema_version: 1

context:
  name: pycronserver
  version: "0.0.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pycronserver-${{ version }}.tar.gz
  sha256: 600cc4c1d17e5de7c648a7a30d20a2c6b5933e7b230aaa288b90a89ed94ea7bc

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - pycronserver=pycronserver.__main__:command_line_parser

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - python-crontab >=2.5.1
    - sqlalchemy >=1.4.31

tests:
  - python:
      imports:
        - pycronserver
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pycronserver --help

about:
  summary: Cron server for python functions
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/pyscioffice/pycronserver

extra:
  recipe-maintainers:
    - jan-janssen
